<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Movie Ratings</title>
    <style>
      body {font-family: Arial, sans-serif; margin: 2rem; background: #f5f7fb; color: #1f2937;}
      header {display:flex; justify-content:space-between; align-items:center; margin-bottom: 1.5rem;}
      nav a {margin-left: 1rem; color: #1d4ed8; text-decoration:none;}
      nav a:hover {text-decoration:underline;}
      form {margin-bottom: 1.5rem;}
      input, button {padding: 0.75rem; margin-right: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px;}
      button {background: #2563eb; color: white; border:none; cursor:pointer;}
      button:hover {background:#1d4ed8;}
      table {border-collapse: collapse; width: 100%; max-width: 700px; background: white;}
      th, td {border: 1px solid #d1d5db; padding: 0.75rem; text-align: left;}
      .card {background: white; padding: 1rem; border-radius: 10px; box-shadow: 0 1px 3px rgba(15,23,42,0.08);}

      @media (max-width: 860px) {
        body {margin: 1rem;}
        header {flex-direction: column; align-items: flex-start; gap: 1rem;}
        nav {display: flex; flex-wrap: wrap; gap: 0.75rem;}
        input, button {width: 100%; max-width: none; margin-right: 0;}
        form {margin-bottom: 1.5rem;}
      }
      @media (max-width: 640px) {
        body {margin: 0.75rem;}
        .card {padding: 1rem;}
        th, td {padding: 0.65rem;}
        table {font-size: 0.95rem;}
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>Movie Ratings</h1>
        <p>Track your favorite films and their scores.</p>
      </div>
      <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
      </nav>
    </header>

    <section class="card">
      <h2>Add a rating</h2>
      <form method="post">
        <input name="movie" placeholder="Movie title" required />
        <input name="score" placeholder="Rating" required />
        <button type="submit">Add Rating</button>
      </form>
    </section>

    <section class="card" style="margin-top: 1.5rem;">
      <h2>Saved ratings</h2>
      {% if ratings %}
      <table>
        <thead>
          <tr><th>Movie</th><th>Rating</th></tr>
        </thead>
        <tbody>
          {% for item in ratings %}
          <tr><td>{{ item.movie }}</td><td>{{ item.score }}</td></tr>
          {% endfor %}
        </tbody>
      </table>
      {% else %}
      <p>No ratings yet. Add your first movie above.</p>
      {% endif %}
    </section>
  </body>
</html>
