<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Movie Rating App</title>
    <style>
      body {font-family: Arial, sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#0f172a; color:#e2e8f0;}
      .login-card {width:100%; max-width:420px; background:#111827; border-radius:18px; padding:2rem; box-shadow:0 20px 50px rgba(15,23,42,0.5);}
      h1 {margin-bottom:1rem;}
      label {display:block; margin-top:1rem; color:#cbd5e1;}
      input {width:100%; padding:0.85rem; margin-top:0.5rem; border-radius:10px; border:1px solid #334155; background:#0f172a; color:#fff;}
      button {width:100%; margin-top:1.5rem; padding:0.85rem; border:none; border-radius:10px; background:#2563eb; color:#fff; cursor:pointer;}
      button:hover {background:#1d4ed8;}
      .message {margin-top:1rem; color:#f8fafc;}
      .link {display:block; margin-top:1rem; color:#93c5fd; text-decoration:none;}
      .link:hover {text-decoration:underline;}

      @media (max-width: 640px) {
        body {padding: 1rem;}
        .login-card {padding: 1.5rem; margin: 0.5rem;}
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>Login</h1>
      <p>Use <strong>deepa@gmail.com</strong> and <strong>deepa123</strong> to sign in.</p>
      <form method="post">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="deepa@gmail.com" required />

        <label for="password">Password</label>
        <input id="password" type="password" name="password" placeholder="deepa123" required />

        <button type="submit">Sign in</button>
      </form>
      {% if message %}
      <p class="message">{{ message }}</p>
      {% endif %}
      <a href="/" class="link">Back to Home</a>
    </div>
  </body>
</html>
